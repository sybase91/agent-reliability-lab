name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev,ui]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest with coverage
        run: pytest -q --cov=src/agent_reliability_lab --cov-report=term-missing --cov-fail-under=85

      - name: Smoke
        run: |
          python -c "import agent_reliability_lab; print('Package import successful')"
          python -m agent_reliability_lab.cli --help

      - name: Streamlit AppTest
        run: pytest -q tests/ui
